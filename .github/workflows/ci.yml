name: CI

# Valida (build + testes) a cada push na main e em todo Pull Request para a main.
# NÃO faz deploy — o deploy é feito manualmente, da máquina do time (chaves ficam locais).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo branch/PR quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────
  # Backend — build + testes unitários (.NET 9)
  # ───────────────────────────────────────────────
  backend:
    name: Backend (.NET 9) — build & testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend/Prontto.sln

      - name: Build (Release)
        run: dotnet build backend/Prontto.sln --no-restore -c Release

      - name: Testes unitários
        run: dotnet test backend/tests/Prontto.UnitTests --no-build -c Release --verbosity minimal

  # ───────────────────────────────────────────────
  # Frontend — build de produção (Angular 21 / Node 20)
  # ───────────────────────────────────────────────
  frontend:
    name: Frontend (Angular) — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: frontend

      - name: Build (produção)
        run: npm run build -- --configuration production
        working-directory: frontend
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Conferir artefato
        run: test -d frontend/dist/prontto/browser && echo "Build OK"
