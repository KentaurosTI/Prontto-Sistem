name: Deploy Prontto

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Testes do backend
  # ─────────────────────────────────────────────
  test-backend:
    name: Testes Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/Prontto.sln

      - name: Build
        run: dotnet build backend/Prontto.sln --no-restore -c Release

      - name: Testes unitários
        run: dotnet test backend/tests/Prontto.UnitTests --no-build -c Release --verbosity minimal

  # ─────────────────────────────────────────────
  # JOB 2 — Build e deploy do Frontend (Hostinger via FTP)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Hostinger
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: frontend

      - name: Build Angular (produção)
        run: npm run build -- --configuration production
        working-directory: frontend
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Verificar build Angular
        run: ls -la frontend/dist/prontto/browser/ && echo "Build OK"

      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./frontend/dist/prontto/browser/
          server-dir: /
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

  # ─────────────────────────────────────────────
  # JOB 3 — Build e deploy do Backend (VPS via SSH)
  # Ativar quando tiver VPS: remover o "if: false"
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → VPS
    runs-on: ubuntu-latest
    needs: test-backend
    if: false  # ← REMOVER quando tiver VPS configurado
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish backend/src/Prontto.Api/Prontto.Api.csproj \
            -c Release \
            -o ./publish \
            --no-self-contained \
            -r linux-x64

      - name: Copiar para VPS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: publish/
          target: /var/www/prontto/

      - name: Reiniciar serviço no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export ASPNETCORE_ENVIRONMENT=Production
            export ConnectionStrings__Default="${{ secrets.DB_CONNECTION_STRING }}"
            export SESSION_SECRET="${{ secrets.SESSION_SECRET }}"
            cd /var/www/prontto
            dotnet /var/www/prontto/publish/Prontto.Api.dll &
            echo "Backend reiniciado"
